<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="eBay利益計算ツール">
    <meta name="theme-color" content="#2c3e50">
    <title>eBay 利益計算ツール</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232c3e50' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='%23fff' text-anchor='middle' dy='.3em'>¥</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>¥ eBay 利益計算ツール</h1>
            <p class="subtitle">日本円で簡単計算</p>
        </header>

        <main>
            <section class="input-section">
                <div class="input-group">
                    <label for="itemPrice">商品価格 (USD)</label>
                    <input type="number" id="itemPrice" placeholder="例：50" min="0" step="0.01">
                </div>

                <div class="input-group">
                    <label for="shippingCost">配送料金 (USD)</label>
                    <input type="number" id="shippingCost" placeholder="例：10" min="0" step="0.01">
                </div>

                <div class="input-group">
                    <label for="quantity">数量</label>
                    <input type="number" id="quantity" placeholder="例：1" min="1" step="1" value="1">
                </div>
            </section>

            <section class="output-section">
                <div class="result">
                    <h2>計算結果</h2>
                    
                    <div class="result-item">
                        <span class="label">商品価格 (円)</span>
                        <span class="value" id="priceJPY">0円</span>
                    </div>

                    <div class="result-item">
                        <span class="label">配送料金 (円)</span>
                        <span class="value" id="shippingJPY">0円</span>
                    </div>

                    <div class="result-item">
                        <span class="label">合計仕入 (円)</span>
                        <span class="value" id="totalCost">0円</span>
                    </div>

                    <div class="separator"></div>

                    <div class="result-item">
                        <span class="label">eBay手数料 (12.5%)</span>
                        <span class="value error" id="ebayFee">0円</span>
                    </div>

                    <div class="result-item">
                        <span class="label">輸入税 (8%)</span>
                        <span class="value error" id="importTax">0円</span>
                    </div>

                    <div class="result-item">
                        <span class="label">総費用</span>
                        <span class="value error" id="totalExpense">0円</span>
                    </div>

                    <div class="separator"></div>

                    <div class="result-item highlight">
                        <span class="label">単価当たり利益</span>
                        <span class="value profit" id="profitPerUnit">0円</span>
                    </div>

                    <div class="result-item highlight">
                        <span class="label">総利益</span>
                        <span class="value profit" id="totalProfit">0円</span>
                    </div>

                    <div class="result-item highlight">
                        <span class="label">利益率</span>
                        <span class="value profit" id="profitMargin">0%</span>
                    </div>
                </div>
            </section>

            <footer class="info">
                <p>📌 為替レート: 1USD = 150円</p>
                <p>📌 eBay手数料: 12.5%</p>
                <p>📌 輸入税: 8%</p>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
